<!DOCTYPE html>
<html>
<head>
    <title>Google Maps KML Example</title>
    <meta charset="utf-8">
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
function initMap() {
    // กำหนดตำแหน่งเริ่มต้น (เช่น หาดใหญ่)
    var center = { lat: 6.870084, lng: 101.254747 };

    // สร้างแผนที่
    var map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: center,
        mapTypeId: 'roadmap'
    });

    // เพิ่ม KML Layer
    var kmlLayer = new google.maps.KmlLayer({
        url: "https://github.com/wutthipongWebGIS/kkutourmap.git/soilkml2.kmz", // 🔁 เปลี่ยนเป็น URL ของคุณ
        map: map,
        preserveViewport: false
    });
}
</script>

<!-- โหลด Google Maps API -->
<script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC5l0aPyGFqiqY5DpqOYf-8YhN_eYHHobU&callback=initMap">
</script>

</body>
</html>
